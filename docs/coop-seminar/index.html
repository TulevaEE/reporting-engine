<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tuleva – harjuta kliendile vastamist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #002f63;        /* Navy Blue – bränd, pealkirjad, tekst-rõhk */
    --bright: #00aeea;      /* Bright Blue – AINULT logo/dekoratiivne aktsent */
    --blue: #006ce6;        /* Action Blue – nupud, lingid */
    --blue-dark: #008dee;   /* Action Blue Light – hover */
    --text: #293036;
    --muted: #6b7074;
    --border: #e0e6ec;
    --border-soft: #d6dee6;
    --bg-soft: #edf7fd;     /* Blue Background 4 – valgussinine */
    --blue-tint: #edf7fd;
    --green: #008300;
    --green-tint: #e6f4e6;
    --red: #db2200;
    --red-tint: #fdece9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Roboto", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: #fff;
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 28px 18px 90px; }

  header { margin-bottom: 8px; }
  .topbar {
    display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 0.875rem; color: var(--muted);
    padding-bottom: 1rem; border-bottom: 1px solid var(--border);
  }
  .topbar .logo svg { display: block; width: 146px; height: auto; }
  .eyebrow { display: inline-block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--blue); margin: 24px 0 8px; }
  header h1 { font-family: "Merriweather", Georgia, serif; font-size: clamp(1.5rem, 5vw, 2rem); margin: 0 0 8px; font-weight: 700; color: var(--navy); letter-spacing: -0.01em; line-height: 1.2; }
  header p { color: var(--muted); margin: 0; font-size: 1rem; line-height: 1.5; }

  .progress { color: var(--muted); font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; margin: 20px 0 8px; }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 1rem;
    padding: 22px;
    margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(0,47,99,0.04);
  }

  .tag {
    display: inline-block; font-size: 0.8rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--blue); margin-bottom: 12px;
  }
  .q-text { font-family: "Merriweather", Georgia, serif; font-size: 1.25rem; font-weight: 700; margin: 0; color: var(--navy); letter-spacing: -0.01em; line-height: 1.32; }

  /* Valikvastused */
  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .opt {
    text-align: left; width: 100%;
    background: #fff; color: var(--text);
    border: 1.5px solid var(--border-soft); border-radius: 0.75rem;
    padding: 13px 15px; font-size: 1rem; font-family: inherit; cursor: pointer;
    margin: 0; font-weight: 400; transition: border-color .12s, background .12s;
  }
  .opt:hover:not(:disabled) { border-color: #b9dcff; background: #f7fbff; }
  .opt:disabled { cursor: default; }
  .opt.correct { border-color: var(--green); background: var(--green-tint); font-weight: 600; }
  .opt.wrong { border-color: var(--red); background: var(--red-tint); }
  .selgitus { margin-top: 14px; padding: 13px 15px; border-radius: 0 0.5rem 0.5rem 0; background: var(--bg-soft); border-left: 4px solid var(--bright); font-size: 0.96rem; }
  .selgitus .k { font-weight: 700; font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; color: var(--muted); }

  textarea {
    width: 100%; min-height: 130px;
    border: 1.5px solid var(--border); border-radius: 0.75rem;
    padding: 13px; font-family: inherit; font-size: 1rem; resize: vertical; margin-top: 16px;
    color: var(--text);
  }
  textarea:focus { outline: none; border-color: var(--blue); }

  button.btn {
    background: var(--blue); color: #fff;
    border: none; border-radius: 0.5rem; padding: 13px 24px;
    font-size: 1rem; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 16px;
    transition: background .12s;
  }
  button.btn:hover:not(:disabled) { background: var(--blue-dark); }
  button.btn:disabled { opacity: 0.55; cursor: default; }
  button.ghost { background: #f4f6f8; color: var(--navy); border: 1px solid var(--border-soft); }
  button.ghost:hover:not(:disabled) { background: #e9edf1; }

  .score { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .stars { font-size: 1.4rem; letter-spacing: 3px; color: var(--blue); }
  .score strong { font-size: 1.1rem; color: var(--navy); }
  .fb-row { margin: 12px 0; }
  .fb-row .k { font-weight: 700; font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 3px; }
  .fb-row.good { background: var(--green-tint); border-left: 4px solid var(--green); padding: 11px 14px; border-radius: 0 0.5rem 0.5rem 0; }
  .fb-row.good .k { color: var(--green); }
  .fb-row.flag { background: var(--red-tint); border-left: 4px solid var(--red); padding: 11px 14px; border-radius: 0 0.5rem 0.5rem 0; }
  .fb-row.flag .k { color: var(--red); }
  .model-answer { background: var(--bg-soft); border-left: 4px solid var(--bright); padding: 13px 15px; border-radius: 0 0.5rem 0.5rem 0; margin-top: 14px; }
  .model-answer .k { color: var(--muted); font-weight: 700; font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }

  /* Ühine arutelu – koolitaja paneel (tumesinine, eristub valgest tagasisidekaardist) */
  .discuss { background: var(--navy); color: #fff; border-color: var(--navy); }
  .discuss .tag { color: var(--bright); }
  .discuss .d-block { margin: 14px 0; }
  .discuss .d-block .k { font-weight: 700; font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.06em; color: #9fd0ff; margin-bottom: 4px; }
  .discuss ul { margin: 6px 0 0; padding-left: 20px; }
  .discuss li { margin-bottom: 6px; }
  .discuss .naide { background: rgba(255,255,255,0.07); border-left: 4px solid #ffc107; padding: 11px 14px; border-radius: 0 0.5rem 0.5rem 0; }
  .discuss .oppetund { background: rgba(255,255,255,0.07); border-left: 4px solid var(--bright); padding: 11px 14px; border-radius: 0 0.5rem 0.5rem 0; }
  .discuss .btn { background: var(--bright); color: var(--navy); }
  .discuss .btn:hover:not(:disabled) { background: #2bc0f5; }

  .error { background: var(--red-tint); border: 1px solid #eccaca; color: #8f2424; padding: 12px 14px; border-radius: 0.75rem; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2.5px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hint { font-size: 0.85rem; color: var(--muted); margin-top: 10px; }
  .big { font-family: "Merriweather", Georgia, serif; font-size: 1.3rem; font-weight: 700; color: var(--navy); letter-spacing: -0.01em; }
  ul.rules { margin: 12px 0 0; padding-left: 20px; }
  ul.rules li { margin-bottom: 8px; }
  ul.rules li strong { color: var(--navy); }
</style>
</head>
<body>

      </span>
      <span class="meta">Coop Pank</span>
    </div>
    <span class="eyebrow">Harjutus</span>
    <h1>Harjuta kliendile vastamist</h1>
    <p>Esmalt viis kiirküsimust, siis neli päris olukorda: kõigepealt vastad ise, seejärel arutame koos.</p>
  </header>

  <div class="progress" id="progress"></div>
  <div id="stage"></div>

<script>
/* =========================================================================

// 2) Valikvastustega soojendus.
const MC = [

    correct: 2,
    selgitus: "III samba peamine eelis on tulumaksusoodustus: kuni 15% maksustatavast brutosissetulekust, kuid mitte üle 6000 € aastas. (4% lisamine on II samba oma.)"

  {
    q: "Klient palub: «Kontrollige ära, kas mu fondivahetuse avaldus läks läbi.» Mida teed?",
    options: [

      "Venekeelsed kliendid ei saa Tulevaga liituda."

    correct: 1,
    selgitus: "Coop Panga äpis ja internetipangas on Tulevaga liitumine praegu toetatud ainult eesti ja inglise keeles. Klienti saab vene keeles suuliselt aidata, saata infot kirjalikult ja suunata Tulevale (644 5100, tuleva@tuleva.ee)."
  }
];

// 4) Vaba vastusega stsenaariumid – pärit Coop Panga päris kõnelogidest.

  {
    text: "Klient küsib otse: «Millisesse Tuleva fondi te soovitaksite mul oma raha panna? Kui suur on tootlus olnud — kas tasub?»",

      punktid: [

  {
    text: "Klient: «Mul on II sammas Swedis, aga tahaksin loobuda ja ise investeerida. Kas teil on ka see 10 aasta reegel?»",
    arutelu: {
      punktid: [
        "Kas tohid klienti tema otsusest ümber veenda?",
        "Mis on siin fakt (mida tohid öelda) ja mis on nõu (mida ei tohi)?",
        "Kas tohid rääkida, kuidas sina ise tegid?"

      punktid: [

    }
  },
  {
    text: "Klient: «Tahaksin avada selle uue kasvukonto — mitte III samba, vaid selle teise, kust saab igal ajal välja võtta. Kas teie kaudu saab?»",
    arutelu: {
      punktid: [
        "Mida teha, kui klient küsib toodet, mida sa ei tunne?",
        "Miks on ohtlik improviseerida või segada II/III sambaga?",
        "Kuidas öelda «ma ei tea» professionaalselt?"
      ],
      naide: "Päris kõne (jaan 2026): teenindaja polnud «kasvukontost» kuulnud, hakkas rääkima II sambast ja segas teema ära — «ei saanud aru, mida klient tahab». Eskalatsioonimärge: «kõnes oli küsitavusi».",
      oppetund: "Klient mõtleb tõenäoliselt Tuleva Täiendavat Kogumisfondi (pensionisüsteemiväline indeksfond, paindlik väljavõtmine, maksusoodustust pole). Kui sa pole kindel — ära improviseeri ega sega II/III sambaga. Ütle ausalt: «täpsustan/uurin» ja suuna Tuleva poole."

// SPIKKER, tagasiside-prompt ja skeem elavad nüüd Apps Scriptis (apps-script.gs).
// Siin lehel neid pole — leht ainult saadab vastuse backendi ja kuvab tagasiside.

/* =========================================================================
   Edasi ei pea midagi muutma
   ========================================================================= */

const stage = document.getElementById("stage");
const progEl = document.getElementById("progress");

let phase = "mc";   // "mc" | "open" | "done"
let mcIndex = 0;
let mcCorrect = 0;
let openIndex = 0;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function stars(n) { return "★".repeat(n) + "☆".repeat(5 - n); }

/* ---------- Valikvastused ---------- */
function renderMC() {
  progEl.textContent = `Soojendus · küsimus ${mcIndex + 1} / ${MC.length}`;
  const item = MC[mcIndex];
  stage.innerHTML = `
    <div class="card">
      <span class="tag">Vali õige</span>
      <p class="q-text">${escapeHtml(item.q)}</p>
      <div class="options" id="opts">
        ${item.options.map((o,i) => `<button class="opt" data-i="${i}">${escapeHtml(o)}</button>`).join("")}
      </div>
      <div id="mc-after"></div>
    </div>`;
  stage.querySelectorAll(".opt").forEach(btn => {
    btn.addEventListener("click", () => answerMC(parseInt(btn.dataset.i, 10)));
  });
}

function answerMC(choice) {
  const item = MC[mcIndex];
  const btns = stage.querySelectorAll(".opt");
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === item.correct) b.classList.add("correct");
    if (i === choice && choice !== item.correct) b.classList.add("wrong");
  });
  if (choice === item.correct) mcCorrect++;
  const last = mcIndex === MC.length - 1;
  document.getElementById("mc-after").innerHTML = `
    <div class="selgitus"><div class="k">Selgitus</div>${escapeHtml(item.selgitus)}</div>
    <button class="btn" id="mc-next">${last ? "Edasi harjutama →" : "Järgmine küsimus →"}</button>`;
  document.getElementById("mc-next").addEventListener("click", () => {
    if (last) { phase = "open"; renderOpenIntro(); }
    else { mcIndex++; renderMC(); }
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
}

/* ---------- Üleminek ---------- */
function renderOpenIntro() {
  progEl.textContent = "Harjutus";
  stage.innerHTML = `
    <div class="card">
      <span class="tag">Soojendus tehtud</span>
      <p class="big">Said ${mcCorrect} / ${MC.length} õigesti 👍</p>
      <p>Nüüd neli päris olukorda. Kirjuta oma vastus nii, nagu ütleksid seda kliendile – paari lausega. AI annab kohe tagasiside, seejärel vaatame koos «Ühise arutelu».</p>
      <button class="btn" id="start-open">Alustan →</button>
    </div>`;
  document.getElementById("start-open").addEventListener("click", () => { renderOpen(); window.scrollTo({top:0,behavior:"smooth"}); });
}

/* ---------- Vaba vastus + AI tagasiside ---------- */
function renderOpen() {
  progEl.textContent = `Harjutus · olukord ${openIndex + 1} / ${SCENARIOS.length}`;
  stage.innerHTML = `
    <div class="card">
      <span class="tag">Olukord</span>
      <p class="q-text">${escapeHtml(SCENARIOS[openIndex].text)}</p>
      <textarea id="answer" placeholder="Kirjuta siia, kuidas sa kliendile vastaksid…"></textarea>
      <button class="btn" id="submit">Saada vastus</button>
      <div class="hint">Vasta nii, nagu ütleksid kliendile – paari lausega. Vastus saadetakse AI-le tagasiside jaoks ja salvestatakse anonüümselt koolituse tabelisse.</div>
    </div>
    <div id="feedback"></div>`;
  const ansEl = document.getElementById("answer");
  const submitBtn = document.getElementById("submit");
  ansEl.focus();
  submitBtn.addEventListener("click", async () => {
    const answer = ansEl.value.trim();
    if (!answer) { ansEl.focus(); return; }
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>Hindan…';
    document.getElementById("feedback").innerHTML = "";
    try {
      const fb = await getFeedback(SCENARIOS[openIndex].text, answer);
      renderFeedback(fb);
      submitBtn.style.display = "none";
      ansEl.readOnly = true;
    } catch (e) {
      document.getElementById("feedback").innerHTML = `<div class="card"><div class="error">${escapeHtml(e.message)}</div></div>`;
      submitBtn.disabled = false;
      submitBtn.textContent = "Proovi uuesti";
    }
  });
}

async function getFeedback(scenario, answer) {
  // Saadab vastuse Google Apps Scriptile. Ilma custom-päiseta → Content-Type on
  // text/plain, mis väldib CORS-preflighti (Apps Script ei vasta preflightile).
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf("PANE-SIIA") === 0) {
    throw new Error("APPS_SCRIPT_URL on seadistamata (vt index.html ülaosa).");
  }
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ scenario, answer })
  });
  if (!res.ok) throw new Error("Viga ühenduses (" + res.status + ")");
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function renderFeedback(fb) {
  const breach = /ületa|rikku|keelat|ei tohi|investeerimisnõu|tootlus|maksunõu/i.test(fb.piirid)
                 && !/korras|ei ületa|polnud|ei rikkunud|ei ületatud|peetud/i.test(fb.piirid);
  const last = openIndex === SCENARIOS.length - 1;
  document.getElementById("feedback").innerHTML = `
    <div class="card">
      <div class="score"><span class="stars">${stars(fb.skoor)}</span> <strong>${fb.skoor}/5</strong></div>
      <div class="fb-row good"><div class="k">Tugevus</div>${escapeHtml(fb.tugevus)}</div>
      <div class="fb-row"><div class="k">Faktid</div>${escapeHtml(fb.faktid)}</div>
      <div class="fb-row ${breach ? "flag" : ""}"><div class="k">Piirid · nõu · tootlus · maks</div>${escapeHtml(fb.piirid)}</div>
      <div class="fb-row"><div class="k">Suunamine</div>${escapeHtml(fb.suunamine)}</div>
      <div class="fb-row"><div class="k">Üks asi paremaks</div>${escapeHtml(fb.arenukoht)}</div>
      <div class="model-answer"><div class="k">Näide heast vastusest</div>${escapeHtml(fb.mudelvastus)}</div>
      <button class="btn" id="to-discuss">Ühine arutelu →</button>
    </div>`;
  document.getElementById("to-discuss").addEventListener("click", renderDiscussion);
}

/* ---------- Ühine arutelu (juhib koolitaja) ---------- */
function renderDiscussion() {
  const a = SCENARIOS[openIndex].arutelu;
  const last = openIndex === SCENARIOS.length - 1;
  const td = document.getElementById("to-discuss");
  if (td) td.style.display = "none";
  const panel = document.createElement("div");
  panel.className = "card discuss";
  panel.innerHTML = `
    <span class="tag">Ühine arutelu</span>
    <div class="d-block"><div class="k">Arutame koos</div>
      <ul>${a.punktid.map(p => `<li>${escapeHtml(p)}</li>`).join("")}</ul></div>
    <div class="d-block naide"><div class="k">Päris kõnest</div>${escapeHtml(a.naide)}</div>
    <div class="d-block oppetund"><div class="k">Õige hoiak</div>${escapeHtml(a.oppetund)}</div>
    <button class="btn" id="next">${last ? "Lõpeta →" : "Järgmine olukord →"}</button>`;
  document.getElementById("feedback").appendChild(panel);
  document.getElementById("next").addEventListener("click", () => {
    if (last) { renderDone(); }
    else { openIndex++; renderOpen(); }
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  panel.scrollIntoView({ behavior: "smooth", block: "start" });
}

/* ---------- Lõpp ---------- */
function renderDone() {
  progEl.textContent = "Valmis";
  stage.innerHTML = `
    <div class="card">
      <span class="tag">Tubli töö!</span>
      <p class="big">Kolm kuldreeglit, mida meeles pidada:</p>
      <ul class="rules">
        <li><strong>Ära anna investeerimisnõu</strong> – ära soovita konkreetset fondi. Selgita, mida kaaluda, ja suuna Tuleva lehele.</li>
        <li><strong>Ära luba tootlust</strong> – mineviku tootlus ei ennusta tulevikku.</li>
        <li><strong>Suuna Tuleva poole</strong> põhjalikumate küsimuste korral: tuleva@tuleva.ee või 644 5100 (E–R 9–17).</li>
      </ul>
      <button class="btn" id="restart">Tee uuesti</button>
    </div>`;
  document.getElementById("restart").addEventListener("click", () => {
    phase = "mc"; mcIndex = 0; mcCorrect = 0; openIndex = 0; renderMC(); window.scrollTo({top:0,behavior:"smooth"});
  });
}

renderMC();
</script>
